<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportMaster — Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-page">
    <div class="login-wrapper">
      <div class="login-card">
        <h1 class="login-title">SportMaster</h1>
        <p class="login-subtitle">Product Calculator</p>
        <form id="loginForm" autocomplete="off">
          <div class="login-field">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username" required autofocus />
          </div>
          <div class="login-field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required />
          </div>
          <div id="loginError" class="login-error hidden"></div>
          <button type="submit" class="btn-login">Log In</button>
        </form>
      </div>
    </div>

    <script src="auth.js"></script>
    <script>
      // If already logged in, go straight to calculator
      if (authGetSession()) {
        window.location.href = 'index.html';
      }

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var username = document.getElementById('username').value;
        var password = document.getElementById('password').value;
        var errorEl = document.getElementById('loginError');

        var user = authLogin(username, password);
        if (user) {
          window.location.href = 'index.html';
        } else {
          errorEl.textContent = 'Invalid username or password.';
          errorEl.classList.remove('hidden');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      });
    </script>
  </body>
</html>
